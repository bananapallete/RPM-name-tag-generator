<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명찰 생성기</title>
  <link rel="icon" href="favicon.png" type="image/png">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#F2F4F6;--sf:#fff;--sf2:#F9FAFB;--bd:#E5E8EB;--bds:#D1D6DB;--pr:#3182F6;--prh:#1B6EF3;--prw:#E8F0FE;--er:#F04452;--t1:#191F28;--t2:#4E5968;--t3:#8B95A1;--t4:#B0B8C1;--r16:16px;--r12:12px;--r8:8px;--r6:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;}
.app{display:grid;grid-template-columns:400px 1fr;min-height:100vh;}
.sidebar{background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:4px;}.sidebar::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.s-hdr{padding:18px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.s-icon{width:36px;height:36px;border-radius:var(--r8);overflow:hidden;flex-shrink:0;}.s-icon img{width:100%;height:100%;object-fit:cover;}
.s-title{font-size:15px;font-weight:700;}.s-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.sec{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:10px;}
.sec-lbl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.01em;text-transform:none;display:flex;align-items:center;gap:6px;}
.sec-lbl::before{content:'';width:3px;height:12px;background:var(--pr);border-radius:2px;display:block;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mode-card{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r8);cursor:pointer;background:var(--sf);transition:all .15s;color:var(--t3);}
.mode-card:hover{border-color:var(--pr);background:var(--prw);color:var(--pr);} .mode-card.active{border-color:var(--pr);background:var(--prw);color:var(--pr);}
.mode-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mode-card.active .mode-icon{background:var(--pr);} .mode-card:hover .mode-icon{background:rgb(49, 131, 246);}
.mode-label{font-size:13px;font-weight:700;}
.dt-wrap{border:1px solid var(--bd);border-radius:var(--r12);overflow:hidden;max-height:200px;overflow-y:auto;}
.dt-wrap::-webkit-scrollbar{width:3px;}.dt-wrap::-webkit-scrollbar-thumb{background:var(--bd);}
.dt{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;}
.dt thead th{background:var(--sf2);padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);position:sticky;top:0;}
.dt .cn{width:28px;text-align:center;}.dt .cx{width:26px;}
.dt td{border-top:1px solid var(--bd);padding:0;}
.dt tbody tr.sel td{background:var(--prw);}.dt tbody tr:hover:not(.sel) td{background:var(--sf2);cursor:pointer;}
.cn-val{text-align:center;color:var(--t3);font-size:10px;font-weight:700;padding:8px 4px;}
.ci{width:100%;border:none;outline:none;padding:8px;font-size:11px;font-family:'Pretendard',sans-serif;color:var(--t1);background:transparent;}
.ci:focus{background:#EFF6FF;}
.cdel{background:none;border:none;color:var(--t4);font-size:13px;cursor:pointer;padding:4px 5px;border-radius:4px;transition:all .12s;}
.cdel:hover{color:var(--er);background:#FEF2F2;}
.add-row{width:100%;padding:8px;border:1.5px dashed var(--bd);border-radius:var(--r8);background:transparent;color:var(--t3);font-size:12px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;transition:all .15s;margin-top:8px;}
.add-row:hover{border-color:var(--pr);color:var(--pr);background:var(--prw);}
.sh-row{display:flex;gap:6px;}
.sh-inp{flex:1;height:36px;padding:0 10px;border:1.5px solid var(--bd);border-radius:var(--r8);font-size:12px;font-family:'Pretendard',sans-serif;color:var(--t1);outline:none;transition:border-color .15s;}
.sh-inp:focus{border-color:var(--pr);}.sh-inp::placeholder{color:var(--t4);}
.btn-ic{width:36px;height:36px;border:1.5px solid var(--bd);border-radius:var(--r8);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;}
.btn-ic:hover{border-color:var(--pr);color:var(--pr);background:var(--prw);}
.sh-st{font-size:11px;padding:6px 10px;border-radius:var(--r6);display:none;}
.sh-st.ok{display:block;background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;}
.sh-st.err{display:block;background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}
.sh-st.info{display:block;background:var(--prw);color:var(--pr);border:1px solid #BFDBFE;}
.list-wrap{border:1px solid var(--bd);border-radius:var(--r12);overflow:hidden;}
.list-hdr{display:grid;grid-template-columns:28px 1fr 1fr 1.4fr;background:var(--sf2);border-bottom:1px solid var(--bd);}
.list-hdr div{padding:7px 8px;font-size:10px;font-weight:700;color:var(--t3);}
.list-body{max-height:180px;overflow-y:auto;}
.list-row{display:grid;grid-template-columns:28px 1fr 1fr 1.4fr;border-top:1px solid var(--bd);cursor:pointer;transition:background .1s;}
.list-row.sel{background:var(--prw);}.list-row:hover:not(.sel){background:var(--sf2);}
.lc{padding:8px;font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ln{text-align:center;font-weight:700;color:var(--t3);}
.list-empty{padding:20px;text-align:center;font-size:12px;color:var(--t3);}
.ev-row{display:flex;gap:8px;}
.ev-inp{flex:1;height:38px;padding:0 10px;border:1.5px solid var(--bd);border-radius:var(--r8);font-size:13px;font-family:'Pretendard',sans-serif;color:var(--t1);outline:none;transition:border-color .15s;}
.ev-inp:focus{border-color:var(--pr);}.ev-inp::placeholder{color:var(--t4);}
.btn-ap{padding:0 14px;height:38px;border:1.5px solid var(--bd);border-radius:var(--r8);background:var(--sf);color:var(--pr);font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-ap:hover{border-color:var(--pr);background:var(--prw);}
.bg-tabs{display:flex;gap:4px;}
.bg-tab{flex:1;padding:7px 0;border:1.5px solid var(--bd);border-radius:var(--r8);background:var(--sf2);color:var(--t3);font-size:12px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;text-align:center;transition:all .15s;}
.bg-tab:hover,.bg-tab.active{border-color:var(--pr);background:var(--prw);color:var(--pr);}
.bg-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.bg-thumb{aspect-ratio:298/420;cursor:pointer;border:2px solid var(--bd);overflow:hidden;position:relative;transition:all .15s;}
.bg-thumb:hover{border-color:var(--pr);transform:scale(1.03);}.bg-thumb.active{border-color:var(--pr);box-shadow:0 0 0 2px var(--prw);}
/* 배경 스타일을 background-color 와 inline SVG 두 가지로 분리 지원 */
.bg-thumb div.cbg-color { width:100%; height:100%; }
.bg-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.bg-thumb .chk{position:absolute;top:4px;right:4px;width:13px;height:13px;background:var(--pr);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:8px;color:#fff;}
.bg-thumb.active .chk{display:flex;}
.font-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.font-btn{padding:9px;border:1.5px solid var(--bd);border-radius:var(--r8);background:var(--sf2);color:var(--t2);font-size:12px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;transition:all .15s;text-align:center;}
.font-btn:hover{border-color:var(--pr);background:var(--prw);color:var(--pr);font-weight:700;} .font-btn.active{border-color:var(--pr);background:var(--prw);color:var(--pr);font-weight:700;}
.font-btn.bb{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.05em;}
.sz-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sz-fld{display:flex;flex-direction:column;gap:4px;}.sz-fld label{font-size:10px;font-weight:700;color:var(--t3);}
.sz-inn{display:flex;align-items:center;border:1.5px solid var(--bd);border-radius:var(--r8);overflow:hidden;background:var(--sf);transition:border-color .15s;}
.sz-inn:focus-within{border-color:var(--pr);}
.sz-inp{flex:1;height:34px;padding:0 8px;border:none;outline:none;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--t1);background:transparent;width:0;}
.sz-unit{padding:0 8px;font-size:10px;font-weight:700;color:var(--t3);background:var(--sf2);border-left:1px solid var(--bd);height:34px;display:flex;align-items:center;}
.sz-hint{font-size:11px;color:var(--t3);padding:7px 10px;background:var(--sf2);border-radius:var(--r6);border:1px solid var(--bd);line-height:1.5;}
.sz-btns{display:flex;gap:8px;}
.btn-pr{background:var(--pr);color:#fff;border:none;border-radius:var(--r8);font-size:14px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;transition:all .15s;padding:14px;width:100%;}
.btn-pr:hover{background:var(--prh);}.btn-pr:disabled{background:var(--bd);color:var(--t4);cursor:not-allowed;}
.btn-ol{background:var(--sf);color:var(--pr);border:1.5px solid var(--pr);border-radius:var(--r8);font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;transition:all .15s;padding:10px;}
.btn-ol:hover{background:var(--prw);}
.btn-gh{background:var(--sf2);color:var(--t2);border:1px solid var(--bd);border-radius:var(--r8);font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;transition:all .15s;padding:10px;}
.btn-gh:hover{background:var(--bd);color:var(--t1);}
.preview-area{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:20px;background:var(--bg);}
.pv-lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}
.sz-badge{display:inline-flex;align-items:center;padding:4px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:999px;font-size:11px;color:var(--t3);font-weight:500;}

/* 명찰 캔버스 래퍼 */
#badge-card { position:relative; width:298px; height:420px; overflow:hidden; flex-shrink:0; box-shadow:none; }
/* 배경 이미지는 꽉 차도록 fill 적용 */
#badge-card .cbg { position:absolute; inset:0; width:100%; height:100%; object-fit:fill; z-index:0; }
/* A타입 전용 CSS 그라디언트 배경 */
#badge-card .cbg-color { position:absolute; inset:0; width:100%; height:100%; z-index:0; }

/* 동적으로 채워질 미리보기 컨테이너 */
#badge-card-inner { position:absolute; inset:0; z-index:1; pointer-events:none; }

/* UI 버튼들 */
.nav-row{display:flex;align-items:center;gap:12px;}
.nav-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bd);background:var(--sf);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.nav-btn:hover{border-color:var(--pr);color:var(--pr);background:var(--prw);}.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-pill{padding:6px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:999px;font-size:12px;font-weight:600;color:var(--t2);min-width:60px;text-align:center;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.mo.show{opacity:1;pointer-events:all;}
.mo-box{background:var(--sf);border-radius:var(--r16);padding:24px 20px;width:300px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(8px) scale(.98);transition:transform .2s;}
.mo.show .mo-box{transform:translateY(0) scale(1);}
.mo-title{font-size:16px;font-weight:700;margin-bottom:4px;}.mo-desc{font-size:12px;color:var(--t3);margin-bottom:16px;}
.mo-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.mo-opt{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r12);cursor:pointer;transition:all .15s;}
.mo-opt:hover,.mo-opt.sel{border-color:var(--pr);background:var(--prw);}
.mo-ic{width:44px;height:44px;border-radius:var(--r8);background:var(--prw);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.mo-opt.sel .mo-ic{background:var(--pr);}
.mo-lbl{font-size:13px;font-weight:700;}.mo-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.mo-btns{display:flex;gap:8px;}
.mo-cancel{flex:1;padding:11px;background:var(--sf);border:1.5px solid var(--bd);border-radius:999px;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;color:var(--t2);cursor:pointer;}
.mo-confirm{flex:2;padding:11px;background:var(--pr);border:none;border-radius:999px;font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;color:#fff;cursor:pointer;}
.mo-confirm:hover{background:var(--prh);}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:#191F28;color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#M{position:fixed;left:-9999px;top:0;white-space:nowrap;visibility:hidden;pointer-events:none;}
#ME{position:fixed;left:-9999px;top:0;max-width:130px;word-break:keep-all;white-space:normal;text-transform:uppercase;letter-spacing:-.01em;visibility:hidden;pointer-events:none;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
</style>
</head>

// E타입 스트라이프 색상 세트
const E_COLOR_SETS = [
  {base:'#7d56ff', stripes:['#784df8','#6a34e4','#5b1ad0','#4c00bb']},
  {base:'#00bf90', stripes:['#00b085','#009970','#00825c','#006b50']},
  {base:'#1986ff', stripes:['#1779f0','#1462cc','#114caa','#0e3888']},
  {base:'#ffcc25', stripes:['#f0c020','#d9aa18','#c29410','#aa7e08']},
  {base:'#f02864', stripes:['#d92058','#c01848','#a81038','#900028']},
  {base:'#ff6e41', stripes:['#f06035','#d95228','#c2441c','#aa3610']},
];

function buildCBgs(cardHeight) {
  const wH = 165, cH = cardHeight - wH;
  const sets = [
    ['#d3b3ff','#674ceb','#3b00ba'],
    ['#99f0d5','#00a87e','#006b50'],
    ['#99c8ff','#1570e8','#0050cc'],
    ['#ffe999','#e6b800','#cc9a00'],
    ['#ff99bb','#d41e56','#8b0036'],
    ['#ffbb99','#e85f36','#cc3d10'],
  ];
  return sets.map(([t1,t2,t3]) => {
    const svg =
      `<svg xmlns="http://www.w3.org/2000/svg" width="298" height="${cardHeight}" viewBox="0 0 298 ${cardHeight}" preserveAspectRatio="none">` +
      `<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">` +
      `<stop offset="0%" stop-color="${t1}"/>` +
      `<stop offset="50%" stop-color="${t2}"/>` +
      `<stop offset="100%" stop-color="${t3}"/>` +
      `</linearGradient></defs>` +
      `<rect width="298" height="${cH}" fill="url(#g)"/>` +
      `<rect y="${cH}" width="298" height="${wH}" fill="#ffffff"/>` +
      `</svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  });
}

function buildDBgs(cardHeight) {
  const wH = 165, cH = cardHeight - wH;
  const colors = ['#7d56ff','#00bf90','#1986ff','#ffcc25','#f02864','#ff6e41'];
  return colors.map(c => {
    const svg =
      `<svg xmlns="http://www.w3.org/2000/svg" width="298" height="${cardHeight}" viewBox="0 0 298 ${cardHeight}" preserveAspectRatio="none">` +
      `<rect width="298" height="${cH}" fill="${c}"/>` +
      `<rect y="${cH}" width="298" height="${wH}" fill="#ffffff"/>` +
      `</svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  });
}

const E_WHITE_H = 165; // 흰색 하단 고정 높이(px, 기본 카드 기준)

function buildEBgs(cardHeight) {
  const whiteH = E_WHITE_H;
  const colorH = cardHeight - whiteH;
  const sh = colorH / 4;
  return E_COLOR_SETS.map(cs => {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="298" height="${cardHeight}" viewBox="0 0 298 ${cardHeight}" preserveAspectRatio="none">` +
      `<rect width="298" height="${colorH}" fill="${cs.base}"/>` +
      cs.stripes.map((c,i) => `<rect y="${sh*i}" width="298" height="${sh}" fill="${c}"/>`).join('') +
      `<rect y="${colorH}" width="298" height="${whiteH}" fill="#ffffff"/>` +
      `</svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  });
}

const F_COLOR_SETS = [

];
const F_FOOTER_H  = 59;
const F_FOOTER_RW = 115;

function buildFBgs(cardH) {
  return F_COLOR_SETS.map(cs => {
    const svg =
      `<svg xmlns="http://www.w3.org/2000/svg" width="298" height="${cardH}" viewBox="0 0 298 ${cardH}" preserveAspectRatio="none">` +
      `<rect width="298" height="${cardH}" fill="${cs.base}"/>` +
      `<rect y="${cardH - F_FOOTER_H}" width="${298 - F_FOOTER_RW}" height="${F_FOOTER_H}" fill="${cs.footL}"/>` +
      `<rect x="${298 - F_FOOTER_RW}" y="${cardH - F_FOOTER_H}" width="${F_FOOTER_RW}" height="${F_FOOTER_H}" fill="${cs.footR}"/>` +
      `</svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  });
}

let rows=[],dir=[{first:'Heung Min',last:'Son',affil:'LAFC'}];
let ci=0,mode='direct',bgT='A',bgI=0,font='pretendard',tpl='A',pmode='cur';

async function init(){
  LOGO=LOGO_URI;

function switchMode(m){
  mode=m;
  document.getElementById('mode-direct').classList.toggle('active',m==='direct');
  document.getElementById('mode-sheet').classList.toggle('active',m==='sheet');
  document.getElementById('panel-direct').style.display=m==='direct'?'':'none';
  document.getElementById('panel-sheet').style.display=m==='sheet'?'':'none';
  if(m==='direct')syncRows();else render();
}

function renderDir(){
  const tb=document.getElementById('dt-body');tb.innerHTML='';
  dir.forEach((r,i)=>{
    const tr=document.createElement('tr');
    if(mode==='direct'&&ci===i)tr.classList.add('sel');
    tr.addEventListener('click',()=>selDir(i));
    const td0=document.createElement('td'),dv=document.createElement('div');
    dv.className='cn-val';dv.textContent=i+1;td0.appendChild(dv);tr.appendChild(td0);
    [['first','이름'],['last','성'],['affil','소속']].forEach(([k,ph])=>{
      const td=document.createElement('td'),inp=document.createElement('input');
      inp.className='ci';inp.placeholder=ph;inp.value=r[k]||'';
      inp.addEventListener('focus',()=>selDir(i));
      inp.addEventListener('input',e=>{dir[i][k]=e.target.value;syncRows();});
      inp.addEventListener('paste',e=>{
        const t=(e.clipboardData||window.clipboardData).getData('text');
        if(t.includes('\t')||t.includes('\n')){e.preventDefault();doPaste(t,i,k);}
      });
      td.appendChild(inp);tr.appendChild(td);
    });
    const tdx=document.createElement('td'),btn=document.createElement('button');
    btn.className='cdel';btn.textContent='✕';
    btn.addEventListener('click',e=>{e.stopPropagation();delRow(i);});
    tdx.appendChild(btn);tr.appendChild(tdx);tb.appendChild(tr);
  });
}
function addRow(){dir.push({first:'',last:'',affil:''});ci=dir.length-1;renderDir();syncRows();setTimeout(()=>{const trs=document.querySelectorAll('#dt-body tr');if(trs.length){const inp=trs[trs.length-1].querySelector('.ci');if(inp)inp.focus();}},30);}
function delRow(i){if(dir.length<=1)dir=[{first:'',last:'',affil:''}];else dir.splice(i,1);if(ci>=dir.length)ci=dir.length-1;renderDir();syncRows();}
function selDir(i){ci=i;document.querySelectorAll('#dt-body tr').forEach((tr,j)=>tr.classList.toggle('sel',j===i));render();updNav();}
function doPaste(txt,sr,sf){
  const fields=['first','last','affil'],sc=fields.indexOf(sf);
  txt.trim().split(/\r?\n/).forEach((line,ri)=>{
    const cols=line.split('\t'),ri2=sr+ri;
    while(dir.length<=ri2)dir.push({first:'',last:'',affil:''});
    cols.forEach((v,c2)=>{const fi=sc+c2;if(fi<fields.length)dir[ri2][fields[fi]]=v.trim();});
  });
  renderDir();syncRows();toast('붙여넣기 완료');
}
function syncRows(){const ev=getEv();rows=dir.map(r=>({event:ev,first:r.first||'',last:r.last||'',affil:r.affil||''}));if(ci>=rows.length)ci=Math.max(0,rows.length-1);render();updNav();}

async function loadSheet(){
  const urlE=document.getElementById('sheet-url');
  const url=urlE.value.trim();
  if(!url){showSt('URL을 입력해주세요','err');return;}
  const m=url.match(/\/d\/([\w-]+)/);
  if(!m){showSt('올바른 구글 시트 URL이 아닙니다','err');return;}
  showSt('불러오는 중...','info');
  try{
    const res=await fetch(APPS+'?id='+m[1]);
    if(!res.ok)throw new Error('서버 오류');
    const data=await res.json();
    if(!data||data.length<2)throw new Error('데이터 없음');
    const hdrs=data[0].map(h=>String(h));
    const find=kws=>hdrs.findIndex(h=>kws.some(k=>h.includes(k)));
    const ei=find(['행사','event']),fi=find(['이름','first']),li=find(['성','last']),ai=find(['소속','affil','company']);
    const ev=getEv();
    rows=data.slice(1).filter(r=>r.some(c=>String(c).trim())).map(r=>({event:String(r[ei<0?0:ei]||'').trim()||ev,first:String(r[fi<0?1:fi]||'').trim(),last:String(r[li<0?2:li]||'').trim(),affil:String(r[ai<0?3:ai]||'').trim()}));
    const shEv=rows.find(r=>r.event)?.event||ev;
    rows=rows.map(r=>({...r,event:r.event||shEv}));
    ci=0;renderList();render();updNav();showSt('✓ '+rows.length+'명 불러옴','ok');
  }catch(e){showSt('❌ '+e.message,'err');}
}
function showSt(msg,type){const el=document.getElementById('sheet-status');el.textContent=msg;el.className='sh-st '+type;}
function renderList(){
  const body=document.getElementById('list-body');
  if(!rows.length){body.innerHTML='<div class="list-empty">데이터 없음</div>';return;}
  body.innerHTML=rows.map((r,i)=>`<div class="list-row${i===ci?' sel':''}" onclick="selRow(${i})"><div class="lc ln">${i+1}</div><div class="lc">${r.first}</div><div class="lc">${r.last}</div><div class="lc">${r.affil}</div></div>`).join('');
}
function selRow(i){ci=i;renderList();render();updNav();toast(rows[i].first+' '+rows[i].last+' 선택됨');}

function getEv(){return document.getElementById('ev-inp').value.trim();}
function applyEv(silent=false){const ev=getEv();if(mode==='direct')syncRows();else rows=rows.map(r=>({...r,event:ev}));render();if(!silent)toast(ev?'"'+ev+'" 적용됨':'행사명 초기화');}

function initGrid(){

        const img=document.createElement('img');img.src=item;img.alt='bg'+i;d.appendChild(img);
    
    const chk=document.createElement('div');chk.className='chk';chk.textContent='✓';d.appendChild(chk);grid.appendChild(d);
  });
}
function selBg(i,silent=false){
    bgI=i;

function switchBgType(t){bgT=t;bgI=0;document.querySelectorAll('.bg-tab').forEach(el=>el.classList.toggle('active',el.id==='bgt-'+t));initGrid();selBg(0,true);setTpl(BGS[t].tpl);toast(t+'타입 적용됨');}

function setTpl(t){

}

function switchFont(f){font=f;document.getElementById('font-pr').classList.toggle('active',f==='pretendard');document.getElementById('font-bb').classList.toggle('active',f==='bebas');render();toast(f==='bebas'?'Bebas Neue 적용됨':'Pretendard 적용됨');}

function applySize(){
  const wv=parseFloat(document.getElementById('sz-w').value),hv=parseFloat(document.getElementById('sz-h').value);
  cWm=(!isNaN(wv)&&wv>0)?wv:105;cHm=(!isNaN(hv)&&hv>0)?hv:148;
  const PPM=298/105;cW=Math.round(cWm*PPM);cH=Math.round(cHm*PPM);
  const card=document.getElementById('badge-card');card.style.width=cW+'px';card.style.height=cH+'px';
  document.querySelectorAll('.bg-thumb').forEach(el=>{el.style.aspectRatio=cWm+'/'+cHm;});
  document.getElementById('sz-badge').textContent=cWm+' × '+cHm+' mm ('+cW+' × '+cH+' px)';
  BGS.C.imgs = buildCBgs(cH);
  BGS.D.imgs = buildDBgs(cH);
  BGS.E.imgs = buildEBgs(cH);
  BGS.F.imgs = buildFBgs(cH);
  if(bgT==='C'||bgT==='D'||bgT==='E'||bgT==='F'){selBg(bgI,true);}
  render();toast(cWm+' × '+cHm+' mm 적용됨');
}
function resetSize(){document.getElementById('sz-w').value='';document.getElementById('sz-h').value='';cW=298;cH=420;cWm=105;cHm=148;const card=document.getElementById('badge-card');card.style.width='298px';card.style.height='420px';document.querySelectorAll('.bg-thumb').forEach(el=>{el.style.aspectRatio='';});document.getElementById('sz-badge').textContent='105 × 148 mm (298 × 420 px)';BGS.C.imgs = buildCBgs(420);
  BGS.D.imgs = buildDBgs(420);
  BGS.E.imgs = buildEBgs(420);
  BGS.F.imgs = buildFBgs(420);
  if(bgT==='C'||bgT==='D'||bgT==='E'||bgT==='F'){selBg(bgI,true);}
  render();toast('기본 사이즈로 초기화');}

function render(){
  const ev=getEv()||'MIDAS SQUARE 1991';
  const r=rows.length?rows[ci]:{event:ev,first:'Heung Min',last:'Son',affil:'LAFC'};
  const d={event:r.event||ev,first:r.first,last:r.last,affil:r.affil};
  
  // HTML 미리보기 렌더링 (JS가 생성한 HTML 코드를 innerHTML로 덮어씌움)
  const inner = document.getElementById('badge-card-inner');
  inner.innerHTML = buildCardHTML(d.event, d.first, d.last, d.affil, cW, cH, tpl, font);
}

function mW(txt,fam,wt,fs,ls){const m=document.getElementById('M');m.style.cssText='font-family:'+fam+';font-weight:'+wt+';font-size:'+fs+'px;letter-spacing:'+ls+';';m.textContent=txt;return m.offsetWidth;}
function calcFs(fn,ln,s,maxW,base){let fs=base;while(fs>12){if(mW(fn,s.fam,s.wt,fs,s.ls)<=maxW&&mW(ln,s.fam,s.wt,fs,s.ls)<=maxW)break;fs--;}return fs;}
function calcEvFs(txt){const m=document.getElementById('ME');m.style.fontFamily="'Pretendard',sans-serif";m.style.fontWeight='600';m.style.lineHeight='0.95';let fs=13;while(fs>8){m.style.fontSize=fs+'px';m.textContent=txt;if(m.offsetHeight<=fs*0.95*2+2)break;fs-=0.5;}return fs;}

function updNav(){const n=rows.length;document.getElementById('nav-pill').textContent=n?(ci+1)+' / '+n:'- / -';document.getElementById('prev-btn').disabled=ci<=0;document.getElementById('next-btn').disabled=ci>=n-1||n===0;}
function goNav(d){ci=Math.max(0,Math.min(rows.length-1,ci+d));render();updNav();if(mode==='direct')renderDir();else renderList();}

function openModal(){if(!rows.length){toast('먼저 데이터를 입력하세요');return;}pmode='cur';selOpt('cur');document.getElementById('opt-cur-sub').textContent=rows[ci].first+' '+rows[ci].last;document.getElementById('opt-all-sub').textContent='전체 '+rows.length+'명 일괄 생성';document.getElementById('pdf-modal').classList.add('show');}
function closeModal(){document.getElementById('pdf-modal').classList.remove('show');}
function selOpt(m){pmode=m;document.getElementById('opt-cur').classList.toggle('sel',m==='cur');document.getElementById('opt-all').classList.toggle('sel',m==='all');}
async function confirmExport(){closeModal();const btn=document.getElementById('export-btn');btn.disabled=true;btn.textContent='생성 중...';await exportPDF(pmode==='all');btn.disabled=false;btn.textContent='PDF 생성하기';}
document.getElementById('pdf-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

async function exportPDF(all=false){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({unit:'mm',format:[cWm,cHm],orientation:'portrait'});
  const toEx=all?rows.map((_,i)=>i):[ci];
  for(let k=0;k<toEx.length;k++){
    if(k>0)pdf.addPage();
    const img=await renderCanvasImage(rows[toEx[k]]);
    pdf.addImage(img,'PNG',0,0,cWm,cHm);
  }
  pdf.save(all?'badges_all.pdf':'badge_'+rows[ci].first+'.pdf');
}

// [렌더링 로직 통합] 미리보기와 PDF가 100% 동일한 HTML을 사용합니다.
// -------------------------------------------------------------
function buildCardHTML(evText, firstText, lastText, affilText, W, H, t, fontKey) {
    const s = FONTS[fontKey];
    const fs = calcFs(firstText, lastText, s, Math.round(W*0.82), 42);
    const evFs = calcEvFs(evText);
    
    // Y_POS 설정을 문자열로 엮어줍니다.
    const stFn = `font-family:${s.fam};font-size:${fs}px;font-weight:${s.wt};line-height:1.05;letter-spacing:${s.ls};white-space:nowrap;overflow:visible;padding-bottom:.05em;`;
    const stLn = `${stFn} margin-top:${Y_POS.lastNameGap}px;`;
    const stAf = `font-size:13px;font-weight:500;letter-spacing:0em;font-family:'Pretendard',sans-serif;margin-top:${Y_POS.affilGap}px;`;
    const stEv = `width:${Y_POS.evMaxWidth}px;font-size:${evFs}px;font-weight:600;letter-spacing:-0.01em;text-transform:uppercase;line-height:1.2;font-family:'Pretendard',sans-serif;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:keep-all;`;
    const stLogo = `height:${Y_POS.logoHeight}px;width:auto;flex-shrink:0;`;

    let html = '';

    if (t === 'A') {
        html += `<div style="position:absolute;left:50%;top:${Y_POS.A_evTop}px;transform:translateX(-50%);text-align:center;color:rgba(255,255,255,.9);${stEv}">${evText}</div>`;
        html += `<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);text-align:center;width:${Math.round(W*0.82)}px;display:flex;flex-direction:column;align-items:center;gap:0px;z-index:2;">`;
        html += `<div style="${stFn} color:#fff;">${firstText}</div>`;
        html += `<div style="${stLn} color:#fff; margin-top:${Y_POS.A_lastNameGap}px;">${lastText}</div>`;
        html += `<div style="${stAf} margin-top:${Y_POS.A_affilGap}px; color:rgba(255,255,255,.82);">${affilText}</div>`;
        html += `</div>`;
        html += `<img src="${LOGO_URI}" style="position:absolute;bottom:${Y_POS.A_logoBottom}px;left:50%;transform:translateX(-50%);${stLogo}">`;
    } 
    else if (t === 'B') {
        html += `<div style="position:absolute;left:${Y_POS.B_leftMargin}px;top:${Y_POS.B_evTop}px;color:rgba(0,0,0,.85);${stEv}">${evText}</div>`;
        html += `<img src="${LOGO_URI_BLK}" style="position:absolute;right:${Y_POS.rightMargin}px;top:${Y_POS.B_evTop - 1}px;${stLogo}">`;
        
        html += `<div style="position:absolute;left:${Y_POS.B_leftMargin}px;bottom:${Y_POS.groupBottom}px;display:flex;flex-direction:column;align-items:flex-start;text-align:left;z-index:2;">`;
        html += `<div style="${stFn} color:#000;">${firstText}</div>`;
        html += `<div style="${stLn} color:#000;">${lastText}</div>`;
        html += `<div style="${stAf} margin-left:2px; color:rgba(0,0,0,.7);">${affilText}</div>`;
        html += `</div>`;
    } 
    else if (t === 'C' || t === 'D') {
        html += `<div style="position:absolute;bottom:0;left:0;width:100%;height:${Y_POS.whiteBoxH}px;background:#fff;z-index:1;"></div>`;
        html += `<img src="${LOGO_URI}" style="position:absolute;right:${Y_POS.rightMargin}px;top:30px;${stLogo}z-index:2;">`;
        html += `<div style="position:absolute;left:${Y_POS.leftMargin}px;bottom:${Y_POS.CD_evBottom}px;color:rgba(255,255,255,.92);${stEv}">${evText}</div>`;
        
        // 이름/성: 흰색박스 상단 고정
        const cdWTop = H - Y_POS.whiteBoxH;
        html += `<div style="position:absolute;left:${Y_POS.leftMargin}px;top:${cdWTop + Y_POS.CD_namePadTop}px;display:flex;flex-direction:column;gap:${Y_POS.CD_nameGap}px;z-index:2;">`;
        html += `<div style="${stFn} color:#000;">${firstText}</div>`;
        html += `<div style="${stFn} color:#000;">${lastText}</div>`;
        html += `</div>`;
        // 소속: 흰색박스 하단
        html += `<div style="position:absolute;left:${Y_POS.leftMargin}px;bottom:${Y_POS.groupBottom}px;${stAf} color:rgba(0,0,0,.65);z-index:2;">${affilText}</div>`;
    } 
    else if (t === 'E') {
        html += `<div style="position:absolute;bottom:0;left:0;width:100%;height:${Y_POS.whiteBoxH}px;background:#fff;z-index:1;"></div>`;
        
        html += `<div style="position:absolute;left:${Y_POS.leftMargin}px;right:${Y_POS.rightMargin}px;bottom:${Y_POS.E_evBottom}px;display:flex;justify-content:space-between;align-items:flex-end;">`;
        html += `<div style="color:rgba(255,255,255,.92);${stEv}">${evText}</div>`;
        html += `<img src="${LOGO_URI}" style="${stLogo}">`;
        html += `</div>`;
        
        // 이름/성: 흰색박스 상단 고정
        const eWTop = H - Y_POS.whiteBoxH;
        html += `<div style="position:absolute;left:${Y_POS.leftMargin}px;top:${eWTop + Y_POS.CD_namePadTop}px;display:flex;flex-direction:column;gap:${Y_POS.CD_nameGap}px;z-index:2;">`;
        html += `<div style="${stFn} color:#000;">${firstText}</div>`;
        html += `<div style="${stFn} color:#000;">${lastText}</div>`;
        html += `</div>`;
        // 소속: 흰색박스 하단
        html += `<div style="position:absolute;left:${Y_POS.leftMargin}px;bottom:${Y_POS.groupBottom}px;${stAf} color:rgba(0,0,0,.65);z-index:2;">${affilText}</div>`;
    }


    else if (t === 'F') {
        const cs = F_COLOR_SETS[bgI];
        const fH  = F_FOOTER_H;
        const fRW = F_FOOTER_RW;
        const cardInnerW = W - 16 - 4 - 16 - 18; // border*2 + padL + padR

        // ── 상단: 흰색 카드 (세로 247px 고정, 가로 반응형) ──
        const cardH_F   = Y_POS.F_whiteCardH;
        const cardPadH  = Y_POS.F_cardPadH;
        const cardTop_F = H - fH - cardPadH - cardH_F;
        html += `<div style="position:absolute;top:${cardTop_F}px;left:${Y_POS.F_cardPadX}px;right:${Y_POS.F_cardPadX}px;height:${cardH_F}px;">`;
        html += `<div style="width:100%;height:100%;background:#fff;border-radius:5px;border:2px solid #f7f7f7;display:flex;flex-direction:column;justify-content:space-between;padding:${Y_POS.F_cardPadTop}px ${Y_POS.F_cardPadL}px ${Y_POS.F_cardPadBot}px;overflow:hidden;box-sizing:border-box;">`;
        // 이름/성
        html += `<div style="display:flex;flex-direction:column;gap:${Y_POS.F_nameGap}px;">`;
        html += `<div style="${stFn} color:#000;">${firstText}</div>`;
        html += `<div style="${stFn} color:#000;">${lastText}</div>`;
        html += `</div>`;
        // 소속 (우측 정렬)
        html += `<div style="${stAf} text-align:right;color:rgba(0,0,0,0.65);">${affilText}</div>`;
        html += `</div></div>`;

        // ── 하단 바 (fixed ${fH}px) ──
        html += `<div style="position:absolute;bottom:0;left:0;right:0;height:${fH}px;display:flex;">`;
        // 좌: fill – 행사명
        html += `<div style="flex:1;background:${cs.footL};display:flex;align-items:center;padding:0 24px;min-width:0;overflow:hidden;">`;
        html += `<div style="color:rgba(255,255,255,.92);${stEv}">${evText}</div>`;
        html += `</div>`;
        // 우: fixed – 로고
        html += `<div style="width:${fRW}px;background:${cs.footR};display:flex;align-items:center;justify-content:center;">`;
        html += `<img src="${LOGO_URI}" style="${stLogo}">`;
        html += `</div>`;
        html += `</div>`;
    }

    return html;
}

async function renderCanvasImage(r) {
  const evText = r.event || getEv() || 'MIDAS SQUARE 1991';
  const htmlStr = buildCardHTML(evText, r.first, r.last, r.affil, cW, cH, tpl, font);
  
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:' + cW + 'px;height:' + cH + 'px;overflow:hidden;background:#fff;';
  
  if (bgT === 'A') {
      // html2canvas의 SVG 크기 버그를 피하기 위해 원본 SVG 문자열을 디코딩해서 직접 HTML(DOM)로 삽입
      const svgBase64 = BGS[bgT].imgs[bgI].split(',')[1];
      // base64 디코딩 (한글이 없으므로 atob 사용 가능)
      const svgStr = atob(svgBase64);
      
      const bgContainer = document.createElement('div');
      bgContainer.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;z-index:0;';
      bgContainer.innerHTML = svgStr;
      
      // 주입된 SVG 요소가 명찰 크기에 꽉 차도록 스타일 강제
      const svgEl = bgContainer.querySelector('svg');
      if (svgEl) {
          svgEl.style.width = '100%';
          svgEl.style.height = '100%';
          svgEl.setAttribute('preserveAspectRatio', 'none');
      }
      wrap.appendChild(bgContainer);
  } else {
      // B, C, D, E, F 타입은 기존처럼 img 태그로 처리
      const bg = document.createElement('img');
      bg.src = BGS[bgT].imgs[bgI];
      bg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:0;';
      wrap.appendChild(bg);
  }
  
  const c = document.createElement('div');
  c.style.cssText = 'position:absolute;inset:0;z-index:1;';
  c.innerHTML = htmlStr;
  wrap.appendChild(c);
  
  document.body.appendChild(wrap);
  // SVG DOM 렌더링을 보장하기 위해 딜레이를 살짝 줌
  await new Promise(res => setTimeout(res, 300)); 
  
  const cvs = await html2canvas(wrap, { scale: 2, useCORS: true, backgroundColor: null });
  document.body.removeChild(wrap);
  
  return cvs.toDataURL('image/png');
}
