<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> RPM 명찰 생성기</title>
  <link rel="icon" href="favicon.png">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ── Design Token ── */
:root {
  --primary: #3182F6;
  --primary-hover: #1B6EF3;
  --primary-pressed: #1660D9;
  --primary-weak: #E8F0FE;
  --primary-weak-hover: #D6E4FD;
  --danger: #F04452;
  --bg: #F2F4F6;
  --surface: #FFFFFF;
  --surface-2: #F9FAFB;
  --border: #E5E8EB;
  --border-strong: #D1D6DB;
  --text-primary: #191F28;
  --text-secondary: #4E5968;
  --text-tertiary: #8B95A1;
  --text-disabled: #B0B8C1;
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 14px;
}

/* ── Layout ── */
.app {
  display: grid;
  grid-template-columns: 400px 1fr;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  height: 100vh;
  position: sticky;
  top: 0;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo {
  width: 36px; height: 36px;
  background: var(--primary);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.sidebar-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.sidebar-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 1px; }

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Section ── */
.section {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.section:last-child { border-bottom: none; }

.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label::before {
  content: '';
  width: 3px; height: 12px;
  background: var(--primary);
  border-radius: 2px;
}

/* ── Data Table ── */
.list-container {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.list-header {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1.5fr;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 0;
}
.list-header-cell {
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
}

.list-body { max-height: 200px; overflow-y: auto; }

.list-item {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1.5fr;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.list-item:last-child { border-bottom: none; }
.list-item:hover { background: var(--surface-2); }
.list-item.selected { background: var(--primary-weak); }
.list-item.selected .list-cell { color: var(--primary); font-weight: 600; }

.list-cell {
  padding: 9px 10px;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Background Grid ── */
.bg-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 5px;
}

.bg-thumb {
  aspect-ratio: 298/420;
  border-radius: 0;
  cursor: pointer;
  border: 2px solid var(--border);
  overflow: hidden;
  position: relative;
  transition: border-color 0.15s, transform 0.15s;
}
.bg-thumb:hover { border-color: var(--primary); transform: scale(1.02); }
.bg-thumb.active { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-weak); }
.bg-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.bg-thumb .check {
  position: absolute; top: 5px; right: 5px;
  width: 12px; height: 12px;
  background: var(--primary);
  border-radius: 50%;
  display: none;
  align-items: center; justify-content: center;
  font-size: 7px; color: #fff;
  box-shadow: var(--shadow-sm);
}
.bg-thumb.active .check { display: flex; }

/* ── Font Toggle ── */
.font-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.font-btn {
  padding: 10px 0;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  text-align: center;
}
.font-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-weak); }
.font-btn.active {
  border-color: var(--primary);
  background: var(--primary-weak);
  color: var(--primary);
  font-weight: 700;
}
.font-btn.bebas { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.05em; }
.font-btn.pretendard { font-family: 'Pretendard', sans-serif; }

/* ── Buttons ── */
.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: -0.01em;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:active { background: var(--primary-pressed); transform: scale(0.99); }
.btn-primary:disabled { background: var(--border-strong); color: var(--text-disabled); cursor: not-allowed; transform: none; }

.btn-row { display: flex; flex-direction: column; gap: 8px; }

.export-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s;
}
.export-option:hover { background: var(--primary-weak); border-color: var(--primary); }
.export-option input[type=checkbox] { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
.export-option label { font-size: 13px; color: var(--text-secondary); cursor: pointer; }

/* ── Preview area ── */
.preview-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 40px;
  gap: 24px;
  background: var(--bg);
  min-height: 100vh;
}

.preview-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.preview-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.preview-size-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
}

/* ── Badge Card ── */
#badge-card {
  width: 298px; height: 420px; /* JS로 동적 변경 */
  border-radius: 0;
  overflow: hidden;
  position: relative;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.04);
  flex-shrink: 0;
}

.card-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
}

.card-content {
  position: absolute; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; padding: 22px 20px;
}

.card-event {
  font-size: 13pt;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.92);
  text-align: center;
  margin-bottom: auto;
  max-width: 110px;
  word-break: keep-all;
  word-wrap: break-word;
  line-height: 1.1;
}

.card-name-wrap { text-align: center; margin: auto 0; width: 253px; }

.card-firstname, .card-lastname {
  display: block;
  line-height: 1.0;
  color: #fff;
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
}

.card-affiliation {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.82);
  letter-spacing: 0.04em;
  margin-top: 12px;
}

.card-logo-area {
  margin-top: auto;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: -20px;
}

.card-logo-img { width: 140px; object-fit: contain; }

/* ── Nav ── */
.nav-row {
  display: flex; align-items: center; gap: 12px;
}

.nav-btn {
  width: 36px; height: 36px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}
.nav-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-weak); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

.nav-pill {
  padding: 6px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  box-shadow: var(--shadow-sm);
  min-width: 64px;
  text-align: center;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

/* ── Hidden measure ── */

#measure-event-el {
  position: fixed; left: -9999px; top: 0;
  max-width: 110px;
  word-break: keep-all;
  word-wrap: break-word;
  white-space: normal;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-align: center;
  visibility: hidden;
  pointer-events: none;
}

#measure-el {
  position: fixed; left: -9999px; top: 0;
  white-space: nowrap; visibility: hidden; pointer-events: none;
}

/* ── Sheet Input ── */
.sheet-input-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.sheet-input {
  flex: 1;
  height: 36px;
  padding: 0 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: 'Pretendard', sans-serif;
  color: var(--text-primary);
  background: var(--surface);
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
}
.sheet-input:focus { border-color: var(--primary); }
.sheet-input::placeholder { color: var(--text-disabled); }

.btn-icon {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-weak); }
.btn-icon.loading { animation: spin 0.8s linear infinite; }

.sheet-status {
  font-size: 11px;
  padding: 6px 10px;
  border-radius: var(--radius-xs);
  display: none;
  margin-top: 6px;
}
.sheet-status.ok  { display: block; background: #ECFDF5; color: #059669; border: 1px solid #A7F3D0; }
.sheet-status.err { display: block; background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
.sheet-status.info{ display: block; background: var(--primary-weak); color: var(--primary); border: 1px solid #BFDBFE; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Size Input ── */
.size-input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.size-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.size-field label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
}
.size-field-inner {
  display: flex;
  align-items: center;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--surface);
  transition: border-color 0.15s;
}
.size-field-inner:focus-within { border-color: var(--primary); }
.size-input {
  flex: 1;
  height: 34px;
  padding: 0 8px;
  border: none;
  outline: none;
  font-size: 13px;
  font-family: 'Pretendard', sans-serif;
  color: var(--text-primary);
  background: transparent;
  width: 0;
}
.size-unit {
  padding: 0 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  background: var(--surface-2);
  border-left: 1px solid var(--border);
  height: 34px;
  display: flex;
  align-items: center;
}
.size-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.5;
  padding: 8px 10px;
  background: var(--surface-2);
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  margin-bottom: 8px;
}
.btn-secondary {
  width: 100%;
  padding: 10px;
  background: var(--surface);
  color: var(--primary);
  border: 1.5px solid var(--primary);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary:hover { background: var(--primary-weak); }
.btn-ghost-sm {
  flex: 1;
  padding: 10px;
  background: var(--surface);
  color: var(--text-secondary);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost-sm:hover { border-color: var(--border-strong); color: var(--text-primary); }
.size-btn-row { display: flex; gap: 8px; }
.btn-secondary-sm {
  flex: 2;
  padding: 10px;
  background: var(--surface);
  color: var(--primary);
  border: 1.5px solid var(--primary);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary-sm:hover { background: var(--primary-weak); }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #191F28;
  color: #fff;
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Pretendard', sans-serif;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease, transform 0.18s ease;
  z-index: 9999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  letter-spacing: -0.01em;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── PDF 확인 모달 ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 28px 24px 20px;
  width: 320px;
  box-shadow: var(--shadow-lg);
  transform: translateY(8px) scale(0.98);
  transition: transform 0.2s;
}
.modal-overlay.show .modal { transform: translateY(0) scale(1); }

.modal-title {
  font-size: 17px; font-weight: 700;
  color: var(--text-primary); margin-bottom: 6px;
}
.modal-desc {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.6; margin-bottom: 20px;
}
.modal-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.modal-option {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
}
.modal-option:hover { border-color: var(--primary); background: var(--primary-weak); }
.modal-option.selected { border-color: var(--primary); background: var(--primary-weak); }
.modal-option-icon {
  width: 36px; height: 36px;
  background: var(--primary-weak);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.modal-option.selected .modal-option-icon { background: var(--primary); }
.modal-option-text {}
.modal-option-label {
  font-size: 14px; font-weight: 700; color: var(--text-primary);
}
.modal-option-sub {
  font-size: 12px; color: var(--text-tertiary); margin-top: 1px;
}
.modal-btn-row { display: flex; gap: 8px; }
.modal-cancel {
  flex: 1; padding: 12px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 999px; font-size: 14px; font-weight: 600;
  font-family: 'Pretendard', sans-serif; color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.modal-cancel:hover { border-color: var(--border-strong); color: var(--text-primary); }
.modal-confirm {
  flex: 2; padding: 12px;
  background: var(--primary); border: none;
  border-radius: 999px; font-size: 14px; font-weight: 700;
  font-family: 'Pretendard', sans-serif; color: #fff;
  cursor: pointer; transition: background 0.15s;
}
.modal-confirm:hover { background: var(--primary-hover); }
.modal-confirm:disabled { background: var(--border-strong); color: var(--text-disabled); cursor:not-allowed; }

/* ── 입력 모드 선택 ── */
.input-mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.input-mode-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface-2);
  color: var(--text-tertiary);
}
.input-mode-card:hover {
  border-color: var(--primary);
  background: var(--primary-weak);
  color: var(--primary);
}
.input-mode-card.active {
  border-color: var(--primary);
  background: var(--primary-weak);
  color: var(--primary);
}
.input-mode-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.12;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.input-mode-card.active .input-mode-icon,
.input-mode-card:hover .input-mode-icon { opacity: 1; background: var(--primary); }
.input-mode-icon svg { position: absolute; }
.input-mode-card:not(.active) .input-mode-icon svg { color: var(--text-tertiary); }
.input-mode-card.active .input-mode-icon svg,
.input-mode-card:hover .input-mode-icon svg { color: #fff; }
.input-mode-label { font-size: 12px; font-weight: 700; }

/* ── 직접 입력 테이블 ── */
.direct-table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 8px;
  max-height: 220px;
  overflow-y: auto;
}
.direct-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  table-layout: fixed;
}
.direct-table thead th {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 7px 8px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  position: sticky; top: 0; z-index: 1;
}
.direct-table .col-num { width: 30px; text-align: center; }

// ── 행사명 직접 입력 ──
function applyEventName(){
  const val = document.getElementById('event-name-input').value.trim();
  const displayEvent = val || sharedEvent;
  rows = rawRows.map(r => ({ ...r, event: displayEvent }));
  if(inputMode === 'direct') syncDirectToRows();
  updatePreview();
  renderList();
  showToast(val ? `행사명 "${val}" 적용됨` : '행사명 초기화됨');
}


// ── 입력 모드 전환 ──
let inputMode = 'direct'; // 'direct' | 'sheet'

function switchMode(mode){
  inputMode = mode;
  document.getElementById('mode-direct').classList.toggle('active', mode==='direct');
  document.getElementById('mode-sheet').classList.toggle('active', mode==='sheet');
  document.getElementById('panel-direct').style.display = mode==='direct' ? '' : 'none';
  document.getElementById('panel-sheet').style.display  = mode==='sheet'  ? '' : 'none';
  if(mode === 'direct') syncDirectToRows();
}

// ── 직접 입력 테이블 ──
let directData = [{ first:'', last:'', affil:'' }];

function renderDirectTable(){
  const tbody = document.getElementById('direct-tbody');
  tbody.innerHTML = '';
  directData.forEach((r, i) => {
    const tr = document.createElement('tr');
    if(inputMode === 'direct' && currentIdx === i) tr.classList.add('selected');

    // 번호 셀
    const tdNum = document.createElement('td');
    const divNum = document.createElement('div');
    divNum.className = 'cell-num';
    divNum.textContent = i + 1;
    tdNum.appendChild(divNum);
    tr.appendChild(tdNum);

    // 입력 셀 생성
    const fields = [
      { key:'first', placeholder:'이름' },
      { key:'last',  placeholder:'성' },
      { key:'affil', placeholder:'소속' },
    ];
    fields.forEach(f => {
      const td = document.createElement('td');
      const inp = document.createElement('input');
      inp.className = 'cell-input';
      inp.placeholder = f.placeholder;
      inp.value = r[f.key] || '';
      inp.dataset.row = i;
      inp.dataset.field = f.key;
      inp.addEventListener('focus', () => selectDirectRow(i));
      inp.addEventListener('input', e => {
        directData[i][f.key] = e.target.value;
        syncDirectToRows();
      });
      // 붙여넣기: 탭/줄바꿈 감지 → 셀 자동 채우기
      inp.addEventListener('paste', e => {
        const text = (e.clipboardData || window.clipboardData).getData('text');
        if(text.includes('\t') || text.includes('\n')){
          e.preventDefault();
          handlePaste(text, i, f.key);
        }
      });
      td.appendChild(inp);
      tr.appendChild(td);
    });

    // 삭제 버튼
    const tdDel = document.createElement('td');
    const btn = document.createElement('button');
    btn.className = 'cell-del';
    btn.title = '삭제';
    btn.textContent = '✕';
    btn.addEventListener('click', e => { e.stopPropagation(); deleteDirectRow(i); });
    tdDel.appendChild(btn);
    tr.appendChild(tdDel);

    tr.addEventListener('click', () => selectDirectRow(i));
    tbody.appendChild(tr);
  });
}

// 엑셀/구글 시트 붙여넣기 처리
function handlePaste(text, startRow, startField){
  const fieldOrder = ['first', 'last', 'affil'];
  const startCol = fieldOrder.indexOf(startField);
  const lines = text.trim().split(/\r?\n/);

  lines.forEach((line, ri) => {
    const cols = line.split('\t');
    const rowIdx = startRow + ri;
    // 필요한 만큼 행 추가
    while(directData.length <= rowIdx){
      directData.push({ first:'', last:'', affil:'' });
    }
    cols.forEach((val, ci) => {
      const colIdx = startCol + ci;
      if(colIdx < fieldOrder.length){
        directData[rowIdx][fieldOrder[colIdx]] = val.trim();
      }
    });
  });

  renderDirectTable();
  syncDirectToRows();
  showToast(lines.length + '행 붙여넣기 완료');
}

function addDirectRow(){
  directData.push({ first:'', last:'', affil:'' });
  currentIdx = directData.length - 1;
  renderDirectTable();
  syncDirectToRows();
  setTimeout(() => {
    const trs = document.querySelectorAll('#direct-tbody tr');
    const lastTr = trs[trs.length - 1];
    if(lastTr){ const inp = lastTr.querySelector('.cell-input'); if(inp) inp.focus(); }
  }, 30);
}

function deleteDirectRow(i){
  if(directData.length <= 1){
    directData = [{ first:'', last:'', affil:'' }];
    currentIdx = 0;
  } else {
    directData.splice(i, 1);
    if(currentIdx >= directData.length) currentIdx = directData.length - 1;
  }
  renderDirectTable();
  syncDirectToRows();
}

function selectDirectRow(i){
  currentIdx = i;
  document.querySelectorAll('#direct-tbody tr').forEach((tr, j) => {
    tr.classList.toggle('selected', j === i);
  });
  updatePreview();
  updateNav();
}

function syncDirectToRows(){
  const evInput = document.getElementById('event-name-input');
  const ev = (evInput ? evInput.value.trim() : '') || sharedEvent;
  rawRows = directData.map(r => ({ event: ev, first: r.first || '', last: r.last || '', affil: r.affil || '' }));
  rows = rawRows.slice();
  if(currentIdx >= rows.length) currentIdx = Math.max(0, rows.length - 1);
  updatePreview();
  updateNav();
}

// ── Toast ──
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1000);
}

const MM_TO_PX = 298 / 105; // ≈ 2.838px/mm (72dpi 기준)
let cardWmm = 105;
let cardHmm = 148;
let cardWpx = 298;
let cardHpx = 420;
let MAX_NAME_W = 253; // 카드 가로의 85%
const FONT_STYLES = {
  bebas:      { fontFamily:"'Bebas Neue',sans-serif",  fontWeight:'400', baseSize:58, letterSpacing:'0.02em', lineHeight:'0.88' },
  pretendard: { fontFamily:"'Pretendard',sans-serif",  fontWeight:'800', baseSize:52, letterSpacing:'-0.01em', lineHeight:'1.2' },
};


// ── 시트 새로고침 ──
// Apps Script 프록시 URL (고정)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyptBSxgQ31x2321wTGVydKhfIS4lVczGMrCee1agqlse0OOrCt-XS2544XNI7mtToPKg/exec';

async function refreshSheet(){
  const input = document.getElementById('sheet-url-input');
  const btn = document.getElementById('refresh-btn');
  const url = input.value.trim();

  if(!url){ showSheetStatus('시트 URL을 입력해주세요', 'err'); return; }
  const match = url.match(/\/d\/([\w-]+)/);
  if(!match){ showSheetStatus('올바른 구글 시트 URL이 아닙니다', 'err'); return; }

  const sheetId = match[1];
  btn.classList.add('loading');
  btn.disabled = true;
  showSheetStatus('불러오는 중...', 'info');

  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?id=${sheetId}`);
    if(!res.ok) throw new Error('서버 오류: ' + res.status);
    const data = await res.json(); // [[행사명,이름,성,소속], [...], ...]

    if(!data || data.length < 2) throw new Error('데이터가 없습니다');

    const headers = data[0].map(h => String(h));
    const dataRows = data.slice(1).filter(r => r.some(c => String(c).trim()));

    const idx = {
      event: headers.findIndex(h => h.includes('행사') || h.toLowerCase().includes('event')),
      first: headers.findIndex(h => h.includes('이름') || h.toLowerCase().includes('first')),
      last:  headers.findIndex(h => h.includes('성') || h.toLowerCase().includes('last')),
      affil: headers.findIndex(h => h.includes('소속') || h.toLowerCase().includes('affil') || h.toLowerCase().includes('company')),
    };
    if(idx.event < 0) idx.event = 0;
    if(idx.first < 0) idx.first = 1;
    if(idx.last  < 0) idx.last  = 2;
    if(idx.affil < 0) idx.affil = 3;

    rawRows = dataRows.map(r => ({
      event: String(r[idx.event] || '').trim(),
      first: String(r[idx.first] || '').trim(),
      last:  String(r[idx.last]  || '').trim(),
      affil: String(r[idx.affil] || '').trim(),
    }));

    const ev = rawRows.find(r => r.event)?.event || '';
    rows = rawRows.map(r => ({ ...r, event: r.event || ev }));

    currentIdx = 0;
    renderList();
    updatePreview();
    updateNav();
    showSheetStatus(`✓ ${rows.length}명 불러옴`, 'ok');
  } catch(e) {
    showSheetStatus('❌ ' + e.message, 'err');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function parseCSV(text){
  return text.trim().split(/\r?\n/).map(line => {
    const result = [];
    let cur = '', inQ = false;
    for(const ch of line){
      if(ch === '"'){ inQ = !inQ; }
      else if(ch === ',' && !inQ){ result.push(cur); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur);
    return result;
  });
}

function showSheetStatus(msg, type){
  const el = document.getElementById('sheet-status');
  el.textContent = msg;
  el.className = 'sheet-status ' + type;
}


// ── 사이즈 수정하기 ──
function applyCardSize(){
  const wInput = parseFloat(document.getElementById('input-w').value);
  const hInput = parseFloat(document.getElementById('input-h').value);

  cardWmm = (!isNaN(wInput) && wInput > 0) ? wInput : 105;
  cardHmm = (!isNaN(hInput) && hInput > 0) ? hInput : 148;
  cardWpx = Math.round(cardWmm * MM_TO_PX);
  cardHpx = Math.round(cardHmm * MM_TO_PX);
  MAX_NAME_W = Math.round(cardWpx * 0.85);

  // 미리보기 카드 사이즈 업데이트
  const card = document.getElementById('badge-card');
  card.style.width  = cardWpx + 'px';
  card.style.height = cardHpx + 'px';

  // bg-thumb aspect-ratio 업데이트
  document.querySelectorAll('.bg-thumb').forEach(el => {
    el.style.aspectRatio = `${cardWmm}/${cardHmm}`;
  });

  // 사이즈 뱃지 텍스트 업데이트
  document.querySelector('.preview-size-badge').textContent =
    `${cardWmm} × ${cardHmm} mm  (${cardWpx} × ${cardHpx} px)`;

  updatePreview();
  showToast(`사이즈 ${cardWmm} × ${cardHmm} mm 적용됨`);
}


// ── 사이즈 초기화 ──
function resetCardSize(){
  document.getElementById('input-w').value = '';
  document.getElementById('input-h').value = '';
  cardWmm = 105; cardHmm = 148;
  cardWpx = 298; cardHpx = 420;
  MAX_NAME_W = 253;
  const card = document.getElementById('badge-card');
  card.style.width  = '298px';
  card.style.height = '420px';
  document.querySelectorAll('.bg-thumb').forEach(el => {
    el.style.aspectRatio = '298/420';
  });
  document.querySelector('.preview-size-badge').textContent = '105 × 148 mm  (298 × 420 px)';
  updatePreview();
  showToast('기본 사이즈로 초기화됨');
}

// ── PDF 모달 ──
let pdfExportMode = 'current'; // 'current' | 'all'

function openPdfModal(){
  if(!rows.length){ showToast('먼저 데이터를 불러오세요'); return; }
  pdfExportMode = 'current';
  selectModalOpt('current');
  document.getElementById('opt-current-sub').textContent =
    `${rows[currentIdx].first} ${rows[currentIdx].last}`;
  document.getElementById('opt-all-sub').textContent =
    `전체 ${rows.length}명 일괄 생성`;
  document.getElementById('pdf-modal').classList.add('show');
}

function closeModal(){
  document.getElementById('pdf-modal').classList.remove('show');
}

function selectModalOpt(mode){
  pdfExportMode = mode;
  document.getElementById('opt-current').classList.toggle('selected', mode==='current');
  document.getElementById('opt-all').classList.toggle('selected', mode==='all');
}

async function confirmExport(){
  closeModal();
  const btn = document.getElementById('modal-confirm-btn');
  const exportBtn = document.getElementById('export-btn');
  exportBtn.disabled = true; exportBtn.textContent = '생성 중...';
  await exportPDF(pdfExportMode === 'all');
  exportBtn.disabled = false; exportBtn.textContent = 'PDF 생성하기';
}

// 모달 바깥 클릭 시 닫기
document.getElementById('pdf-modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

// ── Init ──
async function init(){
  LOGO_PROCESSED = await processLogoImage(LOGO_RAW_SRC);
  renderDirectTable();
  document.getElementById('card-logo').src = LOGO_PROCESSED;
  initBgGrid();
  selectBg(0, true);
  renderList();
  updatePreview();
  updateNav();
}

// ── Logo: remove black bg via canvas pixel ──
function processLogoImage(src){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const cvs = document.createElement('canvas');
      cvs.width = img.naturalWidth; cvs.height = img.naturalHeight;
      const ctx = cvs.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const d = ctx.getImageData(0, 0, cvs.width, cvs.height);
      for(let i = 0; i < d.data.length; i += 4){
        d.data[i+3] = Math.max(d.data[i], d.data[i+1], d.data[i+2]);
      }
      ctx.putImageData(d, 0, 0);
      resolve(cvs.toDataURL('image/png'));
    };
    img.src = src;
  });
}

// ── Background grid ──
function initBgGrid(){
  const grid = document.getElementById('bg-grid');
  BG_IMAGES.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'bg-thumb' + (i===0?' active':'');
    div.onclick = () => selectBg(i);
    const img = document.createElement('img');
    img.src = src; img.alt = BG_LABELS[i];
    div.appendChild(img);
    const chk = document.createElement('div');
    chk.className = 'check'; chk.textContent = '✓';
    div.appendChild(chk);
    grid.appendChild(div);
  });
}

function selectBg(i, silent=false){
  selectedBg = i;
  document.querySelectorAll('.bg-thumb').forEach((el,j) => el.classList.toggle('active', j===i));
  document.getElementById('bg-img').src = BG_IMAGES[i];
  if(!silent) showToast(`배경 ${i+1} 적용됨`);
}

// ── Font ──
function selectFont(f){
  selectedFont = f;
  document.getElementById('font-btn-bebas').classList.toggle('active', f==='bebas');
  document.getElementById('font-btn-pretendard').classList.toggle('active', f==='pretendard');
  applyNameFont();
  showToast(f === 'bebas' ? 'Bebas Neue 적용됨' : 'Pretendard 적용됨');
}

function applyNameFont(){
  const s = FONT_STYLES[selectedFont];
  ['preview-first','preview-last'].forEach(id => {
    const el = document.getElementById(id);
    el.style.fontFamily    = s.fontFamily;
    el.style.fontWeight    = s.fontWeight;
    el.style.letterSpacing = s.letterSpacing;
    el.style.lineHeight    = s.lineHeight;
  });

  // 행사명: 항상 Pretendard 고정
  const evEl = document.getElementById('preview-event');
  evEl.style.fontFamily  = "'Pretendard', sans-serif";
  evEl.style.lineHeight  = '1.1';
  evEl.style.display     = '';
  evEl.style.overflow    = '';

  // Pretendard: 2줄 내 맞도록 폰트사이즈 자동 조절
  const evFs = calcEventFontSize(evEl.textContent);
  evEl.style.fontSize = evFs + 'px';

  const r = rows[currentIdx];
  const fs = calcSharedFontSize(r.first, r.last);
  document.getElementById('preview-first').style.fontSize = fs + 'px';
  document.getElementById('preview-last').style.fontSize  = fs + 'px';
}


// ── 행사명: 2줄 내에 들어오는 최대 폰트 사이즈 계산 (Pretendard만 적용) ──
const BASE_EVENT_FS = 17; // 13pt ≈ 17.33px

function calcEventFontSize(text){
  // 항상 Pretendard로 계산
  const s = FONT_STYLES[selectedFont];
  const m = document.getElementById('measure-event-el');
  m.style.fontFamily  = "'Pretendard', sans-serif";
  m.style.fontWeight  = '700';
  m.style.lineHeight  = '1.1';

  let fs = BASE_EVENT_FS;
  while(fs > 8){
    m.style.fontSize = fs + 'px';
    m.textContent = text;
    const maxHeight = fs * 1.1 * 2;
    if(m.offsetHeight <= maxHeight + 2) break; // +2px 여유
    fs -= 0.5;
  }
  return fs;
}

function measureTextWidth(text, fontFamily, fontWeight, fontSize, letterSpacing){
  const m = document.getElementById('measure-el');
  m.style.fontFamily    = fontFamily;
  m.style.fontWeight    = fontWeight;
  m.style.fontSize      = fontSize + 'px';
  m.style.letterSpacing = letterSpacing;
  m.textContent = text;
  return m.offsetWidth;
}

function calcSharedFontSize(t1, t2){
  const s = FONT_STYLES[selectedFont];
  let fs = s.baseSize;
  while(fs > 14){
    const w1 = measureTextWidth(t1, s.fontFamily, s.fontWeight, fs, s.letterSpacing);
    const w2 = measureTextWidth(t2, s.fontFamily, s.fontWeight, fs, s.letterSpacing);
    if(w1 <= MAX_NAME_W && w2 <= MAX_NAME_W) break;
    fs--;
  }
  return fs;
}

// ── List ──
function renderList(){
  const body = document.getElementById('list-body');
  if(!rows.length){
    body.innerHTML = '<div style="padding:20px;text-align:center;font-size:12px;color:var(--text-tertiary);">구글 시트 URL을 입력하고<br>↻ 버튼을 눌러 데이터를 불러오세요</div>';
    return;
  }
  body.innerHTML = rows.map((r,i) => `
    <div class="list-item${i===currentIdx?' selected':''}" onclick="selectRow(${i})">
      <div class="list-cell" style="text-align:center;color:var(--text-tertiary);font-weight:600;">${i+1}</div>
      <div class="list-cell">${r.first}</div>
      <div class="list-cell">${r.last}</div>
      <div class="list-cell">${r.affil}</div>
    </div>`).join('');
}

function selectRow(i){ currentIdx=i; updatePreview(); updateNav(); renderList(); showToast(`${rows[i].first} ${rows[i].last} 선택됨`); }

// ── Preview ──
function updatePreview(){
  if(!rows.length){
    document.getElementById('preview-event').textContent = 'EVENT NAME';
    document.getElementById('preview-first').textContent = 'First';
    document.getElementById('preview-last').textContent  = 'Last';
    document.getElementById('preview-affil').textContent = 'Affiliation';
    applyNameFont();
    return;
  }
  const r = rows[currentIdx];
  document.getElementById('preview-event').textContent = r.event;
  document.getElementById('preview-first').textContent = r.first;
  document.getElementById('preview-last').textContent  = r.last;
  document.getElementById('preview-affil').textContent = r.affil;
  applyNameFont();
}

function updateNav(){
  if(!rows.length){
    document.getElementById('nav-count').textContent = '- / -';
    document.getElementById('prev-btn').disabled = true;
    document.getElementById('next-btn').disabled = true;
    return;
  }
  document.getElementById('nav-count').textContent = `${currentIdx+1} / ${rows.length}`;
  document.getElementById('prev-btn').disabled = currentIdx <= 0;
  document.getElementById('next-btn').disabled = currentIdx >= rows.length-1;
}

function navigate(dir){
  currentIdx = Math.max(0, Math.min(rows.length-1, currentIdx+dir));
  updatePreview(); updateNav(); renderList();
}

// ── PDF Export ──
async function exportPDF(exportAll = false){
    const { jsPDF } = window.jspdf;
  const W_MM = cardWmm, H_MM = cardHmm;
  const pdf = new jsPDF({ unit:'mm', format:[W_MM,H_MM], orientation:'portrait' });
  const toExport = exportAll ? rows.map((_,i)=>i) : [currentIdx];
  for(let k=0; k<toExport.length; k++){
    if(k>0) pdf.addPage();
    const imgData = await renderCardToImage(rows[toExport[k]]);
    pdf.addImage(imgData,'PNG', 0, 0, W_MM, H_MM);
  }
  pdf.save(exportAll ? 'badges_all.pdf' : `badge_${rows[currentIdx].first}.pdf`);
}


async function renderCardToImage(r){
  const s = FONT_STYLES[selectedFont];
  const sharedFs = calcSharedFontSize(r.first, r.last);

  const wrap = document.createElement('div');
  wrap.style.cssText = `position:fixed;left:-9999px;top:0;width:${cardWpx}px;height:${cardHpx}px;overflow:hidden;`;

  const bgImg = document.createElement('img');
  bgImg.src = BG_IMAGES[selectedBg];
  bgImg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
  wrap.appendChild(bgImg);

  const content = document.createElement('div');
  content.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:22px 20px;';

    const evFs = calcEventFontSize(r.event);
  const ev = el('div', r.event, `font-size:${evFs}px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.92);text-align:center;margin-bottom:auto;font-family:'Pretendard',sans-serif;max-width:110px;word-break:keep-all;word-wrap:break-word;line-height:1.1;`);
  content.appendChild(ev);

  const nw = document.createElement('div');
  nw.style.cssText = 'text-align:center;margin:auto 0;width:253px;';
  nw.appendChild(el('div', r.first, `font-family:${s.fontFamily};font-size:${sharedFs}px;font-weight:${s.fontWeight};line-height:${s.lineHeight};color:#fff;letter-spacing:${s.letterSpacing};white-space:nowrap;`));
  nw.appendChild(el('div', r.last,  `font-family:${s.fontFamily};font-size:${sharedFs}px;font-weight:${s.fontWeight};line-height:${s.lineHeight};color:#fff;letter-spacing:${s.letterSpacing};white-space:nowrap;`));
  nw.appendChild(el('div', r.affil, `font-size:12px;color:rgba(255,255,255,.82);letter-spacing:0.04em;margin-top:12px;font-family:'Pretendard',sans-serif;`));
  content.appendChild(nw);

  const la = document.createElement('div');
  la.style.cssText = 'margin-top:auto;display:flex;align-items:center;justify-content:center;margin-bottom:-20px;';
  const logoEl = document.createElement('img');
  logoEl.src = LOGO_PROCESSED;
  logoEl.style.cssText = 'width:140px;object-fit:contain;';
  la.appendChild(logoEl);
  content.appendChild(la);
  wrap.appendChild(content);
  document.body.appendChild(wrap);

  await new Promise(r => setTimeout(r, 350));
  const canvas = await html2canvas(wrap, { scale:2, useCORS:true, backgroundColor:null });
  document.body.removeChild(wrap);
  return canvas.toDataURL('image/png');
}

function el(tag, text, style){
  const e = document.createElement(tag);
  e.textContent = text;
  if(style) e.style.cssText = style;
  return e;
}

init();
</script>
